version: '3.8'

services:
  # --- MONGO DATABASE SERVICE ---
  mongodb:
    image: mongo:7.0
    container_name: sensym-db
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=sensym_admin
      - MONGO_INITDB_ROOT_PASSWORD=admin_pass
    volumes:
      - mongo_data:/data/db
    entrypoint: >
      bash -c "
      echo 'db.getSiblingDB(\"sensym\").createUser({
        user: \"<user>\",
        pwd: \"<password>\",
        roles: [{ role: \"readWrite\", db: \"sensym\" }]
      });' > /docker-entrypoint-initdb.d/init-user.js && 
      exec docker-entrypoint.sh mongod"
    networks:
      - sensym-network

  # --- YOUR EXPRESS APP SERVICE ---
  express-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sensym-app
    restart: always
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      # Added wrapping quotes so the '#' character doesn't break the string
      - MONGODB_URI=mongodb://<user>:<password>@sensym-db:27017/sensym?authSource=sensym
      - JWT_SECRET=<here_there_nowhere>
    depends_on:
      - mongodb
    networks:
      - sensym-network

# FIXED: Network definition name now matches what the services are using
networks:
  stat-stack-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
